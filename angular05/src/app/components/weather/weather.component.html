<h2>Météo du jour</h2>
<form (ngSubmit)="save()" #weatherForm="ngForm">
  <select [(ngModel)]="weather12.city" name="city" required>
    <option value="" disabled selected hidden>
      Ville
    </option>
    <option *ngFor="let city of cities" [value]="city">
      {{ city }}
    </option>
  </select>
  <input [(ngModel)]="weather12.temperature" name="temperature" placeholder="Temperature" required>
  <select [(ngModel)]="weather12.condition" name="condition" required>
    <option value="" disabled selected hidden>
      Condition
    </option>
    <option *ngFor="let condition of conditions" [value]="condition">
      {{ condition }}
    </option>
  </select>
    <button type="submit" [disabled]="weatherForm.invalid">Enregistrer</button>
</form>

<div class="table-container">
  <table class="table45">
    <thead>
      <tr>
        <th>Ville</th>
        <th>Température</th>
        <th>Condition</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let w of weathers">
        <td>{{w.city}}</td>
        <td>{{w.temperature}}</td>
        <td>{{w.condition}}</td>
        <td>
          <button (click)="edit(w)">Éditer</button>
          <button (click)="delete(w.id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
